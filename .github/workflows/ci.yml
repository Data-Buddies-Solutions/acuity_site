name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      BETTER_AUTH_SECRET: ci-better-auth-secret
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acuity_portal?schema=public
      PORTAL_ALLOW_SIGNUP: "false"
      TELNYX_ALLOW_UNVERIFIED_WEBHOOKS: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run prisma:generate

      - name: Validate Prisma schema
        run: bun run prisma:validate

      - name: Check formatting
        env:
          PRETTIER_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          PRETTIER_HEAD_SHA: ${{ github.sha }}
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
