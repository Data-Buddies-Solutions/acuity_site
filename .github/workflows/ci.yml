name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Prisma
            command: bun run prisma:validate
            generate_prisma: false
          - name: Format
            command: bun run format:check
            generate_prisma: false
          - name: Lint
            command: bun run lint
            generate_prisma: true
          - name: Typecheck
            command: bun run typecheck
            generate_prisma: true
          - name: Test
            command: bun test
            generate_prisma: true
          - name: Build
            command: bun run build
            generate_prisma: false

    env:
      BETTER_AUTH_SECRET: ci-better-auth-secret
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acuity_portal?schema=public
      PORTAL_ALLOW_SIGNUP: "false"
      TELNYX_ALLOW_UNVERIFIED_WEBHOOKS: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        if: matrix.generate_prisma
        run: bun run prisma:generate

      - name: Run ${{ matrix.name }}
        env:
          PRETTIER_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          PRETTIER_HEAD_SHA: ${{ github.sha }}
        run: ${{ matrix.command }}

  migrations:
    name: Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: acuity_portal
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      # Clean history replay must satisfy the guard embedded in the applied July 19 migration.
      CALL_CENTER_MIGRATION_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acuity_portal
      CALL_CENTER_POSTGRES_TEST_URL: postgresql://postgres:postgres@localhost:5432/acuity_portal
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/acuity_portal?schema=public&options=-c%20acuity.call_center_rollback_closed%3Dtrue

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Replay migration history
        run: bunx prisma migrate deploy

      - name: Prove Call Center migrations and mutation ordering
        run: >-
          bun test
          prisma/migrations/20260719190000_retire_dual_webhook_lifecycle/migration.test.ts
          lib/call-center/infrastructure/__tests__/prisma-call-center-practice-lock.postgres.test.ts
