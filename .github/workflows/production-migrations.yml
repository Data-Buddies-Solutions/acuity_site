name: Production Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to run pending Prisma migrations against production."
        required: true
        type: string
      confirm_call_center_rollback_closed:
        description: "Type ROLLBACK CLOSED to authorize removal of rollback-only Call Center state."
        required: false
        default: ""
        type: string
      repair_failed_call_center_rollback_cleanup:
        description: "One-time recovery: mark the failed rollback-state cleanup attempt rolled back before retrying it."
        required: false
        default: false
        type: boolean
      repair_failed_call_center_cleanup:
        description: "One-time recovery: mark the failed canonical cleanup attempt rolled back before retrying it."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Prisma migrate deploy
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Configure rollback closure on the database connection
        if: ${{ inputs.confirm_call_center_rollback_closed == 'ROLLBACK CLOSED' }}
        run: |
          bun -e '
            import { appendFileSync } from "node:fs";
            const url = new URL(process.env.DATABASE_URL);
            const existing = url.searchParams.get("options");
            const rollbackClosure = "-c acuity.call_center_rollback_closed=true";
            url.searchParams.set("options", [existing, rollbackClosure].filter(Boolean).join(" "));
            appendFileSync(process.env.GITHUB_ENV, `DATABASE_URL=${url}\n`);
          '

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        run: bun run prisma:validate

      - name: Check migration status before deploy
        continue-on-error: true
        run: bunx prisma migrate status

      - name: Resolve failed canonical cleanup attempt
        if: ${{ inputs.repair_failed_call_center_cleanup }}
        run: >-
          bunx prisma migrate resolve --rolled-back
          20260715120000_canonical_call_center_cleanup

      - name: Resolve failed rollback-state cleanup attempt
        if: ${{ inputs.repair_failed_call_center_rollback_cleanup }}
        run: >-
          bunx prisma migrate resolve --rolled-back
          20260719180000_remove_call_center_rollback_state

      - name: Deploy pending migrations
        run: bunx prisma migrate deploy

      - name: Check migration status after deploy
        run: bunx prisma migrate status
