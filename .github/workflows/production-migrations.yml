name: Production Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to run pending Prisma migrations against production."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Prisma migrate deploy
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        run: bun run prisma:validate

      - name: Check migration status before deploy
        continue-on-error: true
        run: bunx prisma migrate status

      - name: Deploy pending migrations
        run: bunx prisma migrate deploy

      - name: Check migration status after deploy
        run: bunx prisma migrate status
