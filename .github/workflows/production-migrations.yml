name: Production Migrations

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to run pending Prisma migrations against production."
        required: true
        type: string
      recovery:
        description: "Resolve the known failed call-center migration before deploy."
        required: true
        default: NONE
        type: choice
        options:
          - NONE
          - CALL_CENTER_PLATFORM_FOUNDATION_P3018

permissions:
  contents: read

concurrency:
  group: production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Prisma migrate deploy
    if: ${{ github.ref == 'refs/heads/main' && inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        run: bun run prisma:validate

      - name: Check migration status before deploy
        continue-on-error: true
        run: bunx prisma migrate status

      - name: Resolve known failed call-center migration
        if: ${{ inputs.recovery == 'CALL_CENTER_PLATFORM_FOUNDATION_P3018' }}
        run: >-
          bunx prisma migrate resolve --rolled-back
          20260709120000_call_center_platform_foundation

      - name: Deploy pending migrations
        run: bunx prisma migrate deploy

      - name: Check migration status after deploy
        run: bunx prisma migrate status
