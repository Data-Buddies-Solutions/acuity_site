name: Bootstrap Call Center Configuration

on:
  workflow_dispatch:
    inputs:
      practice_id:
        description: "Practice ID from the reviewed migration report."
        required: true
        type: string
      report_version:
        description: "Full SHA-256 version shown on the reviewed migration report."
        required: true
        type: string
      confirm:
        description: "Type BOOTSTRAP:<practice_id>."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: call-center-configuration-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Apply reviewed LEGACY configuration
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    env:
      CONFIRM: ${{ inputs.confirm }}
      PRACTICE_ID: ${{ inputs.practice_id }}
      REPORT_VERSION: ${{ inputs.report_version }}

    steps:
      - name: Verify explicit confirmation
        run: test "$CONFIRM" = "BOOTSTRAP:$PRACTICE_ID"

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://bootstrap-ci:bootstrap-ci@127.0.0.1:5432/bootstrap-ci
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://bootstrap-ci:bootstrap-ci@127.0.0.1:5432/bootstrap-ci
        run: bun run prisma:validate

      - name: Apply reviewed configuration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: >-
          bun scripts/bootstrap-call-center-configuration.ts
          "$PRACTICE_ID"
          "$REPORT_VERSION"
          "$GITHUB_ACTOR"
          "$GITHUB_TRIGGERING_ACTOR"
          "$GITHUB_RUN_ID"
          "$GITHUB_RUN_ATTEMPT"
