name: Call Center Recovery Report

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    name: Report aggregate recovery state
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql://recovery-report:recovery-report@127.0.0.1:5432/recovery-report
        run: bun install --frozen-lockfile

      - name: Validate Prisma schema
        env:
          DATABASE_URL: postgresql://recovery-report:recovery-report@127.0.0.1:5432/recovery-report
        run: bun run prisma:validate

      - name: Report aggregate recovery state
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun scripts/report-call-center-recovery.ts
